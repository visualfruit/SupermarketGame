<!doctype html>

  <meta charset="utf-8" />

  <title>Supermarkt Kasse — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="products">
      <header>
        <h1>Produkte</h1>
      </header>
      <div id="productGrid" class="product-grid"></div>
    </main>

    <aside class="cart">
      <h2>Warenkorb</h2>
      <ul id="cartList" class="cart-list"></ul>

      <div class="sum-row">
        <span>Summe</span>
        <strong id="total">0,00 €</strong>
      </div>

      <div class="payment-row">
        <button id="barBtn" class="method">BAR</button>
        <button id="cardBtn" class="method">KARTE</button>
      </div>

      <button id="payBtn" class="pay">Bezahlen</button>
    </aside>
  </div>
